<!DOCTYPE html>
<html>
<head>
    <title>TravelSmart Error</title>
    <style>
        body { font-family: sans-serif; background: #fee2e2; color: #991b1b; text-align: center; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 8px; border: 2px solid #ef4444; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #1d4ed8; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ Error</h1>
        <p>{{ message }}</p>
        <a href="/">Go Back</a>
    </div>
</body>
</html>
